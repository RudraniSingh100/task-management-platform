services:
  - type: web
    name: secure-task-platform
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && gunicorn -w 4 -b 0.0.0.0:$PORT todo_app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: secure-task-platform-db
          property: connectionString

databases:
  - name: secure-task-platform-db
    plan: free
